# ─────────────────────────────────────────────────────────────────────────────
# kitty.conf — Ubuntu 26.04 (Wayland/X11), optimised for developer use
# Drop into: ~/.config/kitty/kitty.conf
# Reload without restart: ctrl+shift+f5  or  kitty @ load-config
# ─────────────────────────────────────────────────────────────────────────────


# ── FONT ─────────────────────────────────────────────────────────────────────
# FIX: font_family and font_features must reference the SAME face.
# Previously font_family was "Cascadia Code" while font_features targeted
# "JetBrainsMonoNFM-Regular" — a face that was never loaded, so features
# were silently ignored.
#
# Install Nerd Font variant:
#   mkdir -p ~/.local/share/fonts
#   wget https://github.com/ryanoasis/nerd-fonts/releases/latest/download/JetBrainsMono.zip
#   unzip JetBrainsMono.zip -d ~/.local/share/fonts && fc-cache -fv
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        16.0

# Ligatures: "on" enables ->  =>  !=  etc.
# Think of these as shorthand contractions — the font fuses two characters
# into one glyph the way "can't" is a contraction of "cannot".
disable_ligatures never

# cv01 = alternate 'l', ss01 = alternate '0' (slashed zero).
# Both apply to the correct face now.
font_features JetBrainsMonoNFM-Regular +cv01 +ss01
font_features JetBrainsMonoNFM-Bold    +cv01 +ss01

# Tweak if glyphs feel cramped (0 = auto):
# adjust_line_height  0
# adjust_column_width 0


# ── CURSOR ───────────────────────────────────────────────────────────────────
cursor_shape          block
cursor_blink_interval 0
#cursor_stop_blinking_after 5

# cursor_trail: animate a short trail so the cursor is easy to spot after a
# big jump (e.g. switching splits). Value = min cells moved before it animates.
#cursor_trail          25


# ── SCROLLBACK ───────────────────────────────────────────────────────────────
# 10 000 lines is plenty; bumping to 50 000 won't hurt on modern RAM.
scrollback_lines 50000

# Pipe scrollback into less for proper search:
# ctrl+shift+h triggers this by default
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# NEW: notify when a long-running command finishes in a background tab.
# Invaluable for `gcloud deploy`, `npm ci`, long test runs, etc.
# "unfocused" = notify only when the tab is not active.
notify_on_cmd_finish unfocused 10.0 notify


# ── PERFORMANCE ──────────────────────────────────────────────────────────────
# repaint_delay: how long kitty waits to batch screen updates (ms).
# Like a debounce on a button — too low wastes GPU cycles, too high feels sluggish.
# FIX: raised from 8 → 10 (default). 8ms targets ~125fps; unless you have a
# 120Hz+ display this burns GPU for zero perceptible gain.
repaint_delay    10
input_delay      2
sync_to_monitor  yes


# ── WINDOW / PADDING ─────────────────────────────────────────────────────────
window_padding_width       8
window_border_width        1pt
draw_minimal_borders       yes
hide_window_decorations    no
confirm_os_window_close    1

remember_window_size       yes
initial_window_width       1200
initial_window_height      700

# Resize granularity — cells, not pixels.
# This means the window snaps to exact character boundaries (no half-cell edge).
resize_in_steps yes


# ── COLOUR THEME ─────────────────────────────────────────────────────────────
# Tokyo Night — a good dark theme with excellent contrast ratios.
# Swap out this block with any theme from: https://github.com/kovidgoyal/kitty-themes
# or run: kitty +kitten themes

background            #1a1b26
foreground            #c0caf5
selection_background  #364a82
selection_foreground  #c0caf5
cursor                #c0caf5
cursor_text_color     #1a1b26
url_color             #73daca

# Normal colours
color0  #15161e
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #7dcfff
color7  #a9b1d6

# Bright colours
color8  #414868
color9  #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5

background_opacity     1.0
dynamic_background_opacity no


# ── TABS ─────────────────────────────────────────────────────────────────────
# Think of Kitty tabs like browser tabs — each is an independent OS window
# process but they share the same kitty instance.
# FIX: raised truncation from 20 → 30. At 20 chars most Node.js process names
# and git branch names get cut off mid-word.
tab_title_template    "{index}: {title[:30]}"
active_tab_foreground   #1a1b26
active_tab_background   #7aa2f7
inactive_tab_foreground #a9b1d6
inactive_tab_background #24283b
tab_bar_background      #1a1b26
tab_bar_edge          top
tab_bar_style         powerline
tab_powerline_style   slanted
tab_bar_min_tabs      2
tab_bar_align         left

# ── SPLITS / LAYOUTS ─────────────────────────────────────────────────────────
# Kitty calls splits "windows" within a tab (confusingly).
# Layouts cycle with ctrl+shift+l. "splits" gives arbitrary vim-like nested
# splits — it's in kitty's default set and was previously omitted here.
enabled_layouts splits,tall,fat,grid,horizontal,vertical,stack


# ── KEYBOARD SHORTCUTS ───────────────────────────────────────────────────────
kitty_mod ctrl+shift

# Only NON-DEFAULT bindings live here. kitty already binds, under kitty_mod:
#   right/left next/prev tab · ]/[ next/prev window · f/b move window ·
#   r resize · c/v/s copy/paste · h scrollback · l next layout · f5/f6
#   reload/debug-config · =/- font size. No need to restate them.

# Tabs — cwd-aware new tab, and digits jump to TABS (default = jump to windows)
map kitty_mod+t     new_tab_with_cwd
# kitty_mod+w is close_window by default; repurposed here for close_tab
map kitty_mod+w     close_tab
# default new_os_window drops the cwd; this carries it over
map kitty_mod+n     new_os_window_with_cwd
map kitty_mod+1     goto_tab 1
map kitty_mod+2     goto_tab 2
map kitty_mod+3     goto_tab 3
map kitty_mod+4     goto_tab 4
map kitty_mod+5     goto_tab 5

# Splits (windows within a tab) — cwd-aware variants; close on +d since +w is tab
map kitty_mod+enter    new_window_with_cwd
map kitty_mod+d        close_window

# Font size — smaller step (1.0) than kitty's default (2.0)
map kitty_mod+equal    change_font_size all +1.0
map kitty_mod+minus    change_font_size all -1.0
map kitty_mod+0        change_font_size all 0

# Scrollback — extra binding for last-command-output (default kitty_mod+g
# also still works); kitty_mod+alt+g avoids apps/shells that grab ctrl+shift+g.
map kitty_mod+alt+g    show_last_command_output

# NEW: Hint kittens — select visible paths, lines, or words without mouse.
# Like a keyboard-driven "click anything on screen". Extremely useful for
# grabbing file paths from compiler errors, log lines, git output, etc.
map kitty_mod+p>f      kitten hints --type path --program @
map kitty_mod+p>l      kitten hints --type line --program @
map kitty_mod+p>w      kitten hints --type word --program @
# Open hinted path directly in $EDITOR:
map kitty_mod+p>e      kitten hints --type path


# ── URL HANDLING ─────────────────────────────────────────────────────────────
open_url_with         default
url_prefixes          file ftp ftps gemini git http https irc ircs kitty mailto news sftp ssh
detect_urls           yes
url_style             curly


# ── BELL ─────────────────────────────────────────────────────────────────────
enable_audio_bell     no
visual_bell_duration  0
window_alert_on_bell  yes


# ── SHELL INTEGRATION ────────────────────────────────────────────────────────
# Enables: jump-to-prompt, last-command-output, cwd-aware new windows.
# Kitty injects a small snippet into your shell rc automatically.
shell_integration     enabled no-cursor


# ── REMOTE CONTROL ───────────────────────────────────────────────────────────
# Allows `kitty @` commands from inside a running session.
# Useful for scripting tab/window management (e.g. gcloud CLI automation).
allow_remote_control  socket-only
listen_on             unix:/tmp/kitty-{kitty_pid}
# RECOMMENDATION: add a remote_control_password if you run untrusted code
# in the same user session (relevant for sandbox/container workflows):
# remote_control_password "your-password" *


# ── SSH KITTEN (terminfo fix) ─────────────────────────────────────────────────
# Use `kitty +kitten ssh user@host` instead of plain ssh.
# It automatically copies the kitty terminfo to the remote, solving the
# "unknown terminal type" issue on GCP instances etc.
# Add to your shell rc:  alias kssh="kitty +kitten ssh"


# ── WAYLAND-SPECIFIC ─────────────────────────────────────────────────────────
# NOTE: wayland_titlebar_color is a no-op on GNOME + Wayland (Ubuntu 26.04
# default). GNOME controls titlebars via its own theme, not this setting.
# It IS effective on KDE Plasma + Wayland. Safe to keep for portability.
linux_display_server   auto
wayland_titlebar_color background


# ── MISC ─────────────────────────────────────────────────────────────────────
term                  xterm-kitty
editor                .
close_on_child_death  no
strip_trailing_spaces smart
